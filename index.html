<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to City Coder</title>
    <link rel="icon" href="assets/images/logo.png" type="image/png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&family=Jersey+15&family=Oxanium:wght@200..800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="welcome-style.css">
</head>
<body>
    <div class="welcome-container">
        <img src="assets/images/logo.png" alt="City Coder Logo" class="welcome-logo">
        
        <h1 class="welcome-title">CITY CODER</h1>
        <p class="welcome-desc">
            <br>
            來編寫你自己的迷你世界，並看著它活起來！

        <!-- Primary CTA → tutorial -->
        <a href="tutorial.html" class="btn btn-run welcome-btn">📚 新手教程</a>

        <!-- Secondary link for returning users -->
        <a href="app.html" class="skip-link">已經學過了？直接進入 CodeScape →</a>
    </div>

    <style>
        .skip-link {
            margin-top: 1.2rem;
            font-family: 'Oxanium', sans-serif;
            font-size: 0.82rem;
            color: rgba(0, 255, 136, 0.4);
            text-decoration: none;
            letter-spacing: 0.5px;
            transition: color 0.2s;
        }
        .skip-link:hover { color: rgba(0, 255, 136, 0.8); }
    </style>
